# EcoVerify API + Postgres on Render
# Dashboard: New → Blueprint → Connect this repo → apply render.yaml

services:
  - type: web
    name: ecoverify-api
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    # Free tier does not support preDeployCommand — run migrate/seed on start.
    startCommand: npx prisma db push && node prisma/seed.js && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: AI_PROVIDER
        value: mock
      - key: CORS_ORIGIN
        # Comma-separated. Add your Vercel URL (and localhost for testing).
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: ecoverify-db
          property: connectionString

databases:
  - name: ecoverify-db
    plan: free
    databaseName: ecoverify
    user: ecoverify
    # Allow external connections (local Prisma Studio / debugging).
    # Narrow this in production if you prefer private-only.
    postgresMajorVersion: "16"
