services:
  postgres:
    image: postgres:16-alpine
    container_name: ecoverify-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ecoverify
      POSTGRES_PASSWORD: ecoverify
      POSTGRES_DB: ecoverify
    volumes:
      - ecoverify_pg_data:/var/lib/postgresql/data

volumes:
  ecoverify_pg_data:
